services:
  - type: web
    name: aura-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_NAME
        value: AURA BOT
      - key: BOT_PREFIX
        value: /
      - key: OWNER_NUMBER
        sync: false
      - key: OWNER_NAME
        sync: false